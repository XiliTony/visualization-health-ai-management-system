# Web 服务访问端口
server:
  port: 9090

# Spring 和数据库配置
spring:
  application:
    name: api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/health2?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

# 配置 MyBatis 实体和 xml 映射
mybatis:
  ## 映射 xml
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 配置日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# langchain4j 配置
langchain4j:
  community:
    dashscope:
      # 普通对话模型
      chat-model:
        model-name: qwen-max
        api-key:
      # RAG 模型
      embedding-model:
        model-name: text-embedding-v4
        api-key:
      # 流式输出模型
      streaming-chat-model:
        model-name: qwen-max
        api-key:

# 智谱 Web 搜索MCP服务
bigmodel:
  api-key: